<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>PPG Realtime</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/socket.io/socket.io.js"></script>
  </head>
  <body>
    <canvas id="chart" width="900" height="400"></canvas>

    <script>
      const socket = io();
      let x = 0;
      const WINDOW = 100;

      const chart = new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
          labels: [],
          datasets: [
            {
              label: "IR RAW",
              data: [],
              borderWidth: 1,
              tension: 0.2,
            },
            {
              label: "IR FILTERED",
              data: [],
              borderWidth: 2,
              tension: 0.4,
            },
          ],
        },
        options: {
          animation: false,
          scales: {
            x: { min: 0, max: WINDOW },
            y: { beginAtZero: false },
          },
        },
      });

      socket.on("ppg", (data) => {
        x++;

        chart.data.labels.push(x);
        chart.data.datasets[0].data.push(data.ir_raw);
        chart.data.datasets[1].data.push(data.ir_filtered);

        chart.options.scales.x.min = Math.max(0, x - WINDOW);
        chart.options.scales.x.max = x;

        chart.update("none");
      });
    </script>
  </body>
</html>
